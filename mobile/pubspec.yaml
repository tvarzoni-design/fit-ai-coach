name: fit_ai_coach
description: Fit AI Coach - Coach de Musculação e Cardio com IA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Routing
  go_router: ^13.0.0
  
  # HTTP & API
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  
  # Charts
  fl_chart: ^0.66.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.2.1
  image_picker: ^1.0.7
  
  # Auth
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0
  
  # Push Notifications
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  
  # Permissions
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
